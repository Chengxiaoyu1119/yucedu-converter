name: Windows tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project
        run: python -m pip install -e .

      - name: Check repository privacy
        run: python -X utf8 scripts/check_privacy.py --check-git-identity

      - name: Run tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = Join-Path $PWD "src"
          python -X utf8 -m unittest discover -s tests -v
